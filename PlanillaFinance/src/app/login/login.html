<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>HWPeru</h2>
            <p>Por favor ingrese sus datos para iniciar sesión.</p>
        </div>

        <div class="login-error-alert" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" formControlName="email" placeholder="Ingrese su correo"
                        [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                </div>
                <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es requerido</span>
                    <span *ngIf="loginForm.get('email')?.errors?.['email']">Por favor ingrese un correo válido</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                        placeholder="Ingrese su contraseña"
                        [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
                        <span *ngIf="!showPassword">Ver</span>
                        <span *ngIf="showPassword">Ocultar</span>
                    </button>
                </div>
                <div class="error-message"
                    *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    La contraseña es requerida
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" formControlName="rememberMe">
                    <span>Recordarme</span>
                </label>
            </div>

            <button type="submit" class="submit-btn" [class.btn-disabled]="loginForm.invalid">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            <p>&copy; 2026 HWPeru. Todos los derechos reservados.</p>
        </div>

    </div>
</div>
