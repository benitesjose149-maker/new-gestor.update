<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Gesstor HWPeru</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-ring"></div>
    <img src="logo.png" alt="HWPeru" class="splash-logo">
  </div>

  <style>
    #splash-screen {
      display: none;
    }

    @media (display-mode: standalone) {
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0e1a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        animation: splashFadeOut 0.5s ease 2.3s forwards;
      }
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      position: relative;
      z-index: 2;
      animation: splashLogoIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both,
        splashLogoPulse 1.5s ease-in-out 0.8s 2;
    }

    .splash-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 3px solid transparent;
      border-top-color: #3b82f6;
      border-right-color: #3b82f6;
      border-radius: 50%;
      z-index: 1;
      animation: splashRingSpin 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both,
        splashRingFade 0.4s ease 2s forwards;
    }

    @keyframes splashLogoIn {
      from {
        opacity: 0;
        transform: scale(0.3);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes splashLogoPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3));
      }

      50% {
        filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7));
      }
    }

    @keyframes splashRingSpin {
      from {
        opacity: 0;
        transform: rotate(0deg) scale(0.5);
      }

      to {
        opacity: 1;
        transform: rotate(360deg) scale(1);
      }
    }

    @keyframes splashRingFade {
      to {
        opacity: 0;
        transform: rotate(720deg) scale(1.3);
      }
    }

    @keyframes splashFadeOut {
      to {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }
    }
  </style>

  <app-root></app-root>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => { });
    }
    // Remove splash from DOM after animation
    setTimeout(() => {
      const s = document.getElementById('splash-screen');
      if (s) s.remove();
    }, 3000);
  </script>
</body>

</html>
